<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CorpFinLab — Sign In · FIA 203</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#05080f;color:#eef2f7;font-family:'Syne',sans-serif;}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.box{background:#0a0f1a;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:44px 40px;width:100%;max-width:420px;}
.logo{font-size:1.6rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:4px;}
.logo span{color:#3b82f6;}
.sub{font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:#3b82f6;letter-spacing:0.15em;margin-bottom:32px;}
label{display:block;font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:#7f8fa6;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px;margin-top:18px;}
input{width:100%;background:#111827;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px 14px;color:#eef2f7;font-family:'JetBrains Mono',monospace;font-size:0.9rem;outline:none;transition:border-color 0.2s;}
input:focus{border-color:#3b82f6;}
.btn{width:100%;margin-top:24px;padding:13px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;transition:background 0.2s;}
.btn:hover{background:#2563eb;}
.msg{display:none;margin-top:16px;padding:12px 14px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:0.75rem;line-height:1.6;text-align:center;}
.msg.err{background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.3);color:#ff6b6b;}
.msg.ok{background:rgba(0,200,100,0.1);border:1px solid rgba(0,200,100,0.3);color:#00e676;}
.footer{margin-top:28px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.07);font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:#3d4f6b;text-align:center;line-height:1.9;}
</style>
</head>
<body>
<div class="box">
  <div class="logo"><span>CorpFin</span>Lab</div>
  <div class="sub">FIA 203 · CORPORATE FINANCE-I · IMT HYD</div>

  <label>Enrollment ID</label>
  <input type="text" id="uid" placeholder="e.g. 26A1HP013" autocomplete="off" spellcheck="false">

  <label>Class Key</label>
  <input type="password" id="key" placeholder="Given by Dr. Chaturvedula">

  <button class="btn" id="btn" onclick="login()">Enter CorpFinLab</button>
  <div class="msg" id="msg"></div>

  <div class="footer">
    CorpFinLab · FIA 203 · IMT Hyderabad<br>
    Dr. Chakrapani Chaturvedula<br>
    Term II · AY 2025-26
  </div>
</div>

<script>
var KEY = 'IMTCF26';
var IDS = ['26A1HP013','26A1HP085','26A1HP153','26A3HP640','26A1HP215'];
var APPSURL = 'https://script.google.com/macros/s/AKfycbwEA2oFByWVURilCo6gfrU9IcrkEPXS5DcFgvMWvMhPm-HpiE--1rLxI26SxxDRDWu8RQ/exec';

function show(txt, type) {
  var m = document.getElementById('msg');
  m.textContent = txt;
  m.className = 'msg ' + type;
  m.style.display = 'block';
}

function login() {
  var uid = document.getElementById('uid').value.trim().toUpperCase();
  var key = document.getElementById('key').value.trim();

  if (!uid) { show('Please enter your Enrollment ID.', 'err'); return; }
  if (!key)  { show('Please enter the Class Key.', 'err'); return; }
  if (key !== KEY) { show('Wrong Class Key. Check with your instructor.', 'err'); return; }
  if (IDS.indexOf(uid) === -1) { show('ID not found: ' + uid + '. Contact Dr. Chaturvedula.', 'err'); return; }

  var session = {enrollId: uid, name: uid, expires: Date.now() + 86400000, loginTime: new Date().toISOString()};
  localStorage.setItem('cfSession', JSON.stringify(session));

  show('Welcome ' + uid + '! Loading modules...', 'ok');
  document.getElementById('btn').disabled = true;

  try {
    var sc = document.createElement('script');
    window.cfnoop = function(){};
    sc.src = APPSURL + '?action=login&id=' + encodeURIComponent(uid) + '&callback=cfnoop';
    document.head.appendChild(sc);
  } catch(e) {}

  setTimeout(function() { window.location.href = 'cf_course.html'; }, 1200);
}

document.addEventListener('keydown', function(e) { if (e.key === 'Enter') login(); });

try {
  var ss = JSON.parse(localStorage.getItem('cfSession') || 'null');
  if (ss && ss.expires > Date.now()) window.location.href = 'cf_course.html';
} catch(e) { localStorage.removeItem('cfSession'); }
</script>
</body>
</html>
